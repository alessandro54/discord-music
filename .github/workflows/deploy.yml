name: Build & Deploy to Dokku

on:
  workflow_dispatch:
  # Weekly rebuild keeps yt-dlp + the EJS solver current with YouTube changes
  # (cache-busted so pip actually re-pulls — see CACHEBUST below).
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  push:
    branches: [main]
    paths:
      - 'src/**/*.js'
      - 'deno.json'
      - 'deno.lock'
      - 'Dockerfile'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/alessandro54/discord-music

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm   # native arm64 — no QEMU emulation
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Write build info
        run: |
          echo "export const COMMIT = '${{ github.sha }}';" > src/lib/buildInfo.js
          echo "export const COMMIT_URL = 'https://github.com/${{ github.repository }}/commit/${{ github.sha }}';" >> src/lib/buildInfo.js

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          # Scheduled runs bust the pip-install layer so yt-dlp re-pulls fresh;
          # pushes keep the cache for fast builds.
          build-args: |
            CACHEBUST=${{ github.event_name == 'schedule' && github.run_id || '' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy on Dokku
        uses: appleboy/ssh-action@v1
        with:
          host: 143.47.116.141
          username: ubuntu
          key: ${{ secrets.DOKKU_SSH_KEY }}
          script: sudo dokku git:from-image music-bot ${{ env.IMAGE }}:${{ github.sha }}
