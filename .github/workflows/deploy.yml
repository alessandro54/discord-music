name: Build & Deploy to Dokku

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**/*.js'
      - 'deno.json'
      - 'deno.lock'
      - 'Dockerfile'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/alessandro54/discord-music

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Write build info
        run: |
          echo "export const COMMIT = '${{ github.sha }}';" > src/lib/buildInfo.js
          echo "export const COMMIT_URL = 'https://github.com/${{ github.repository }}/commit/${{ github.sha }}';" >> src/lib/buildInfo.js

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy on Dokku
        uses: appleboy/ssh-action@v1
        with:
          host: 143.47.116.141
          username: ubuntu
          key: ${{ secrets.DOKKU_SSH_KEY }}
          script: sudo dokku git:from-image music-bot ${{ env.IMAGE }}:${{ github.sha }}
