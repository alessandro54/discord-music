name: Deploy to Mamba Host

on:
  push:
    branches: [main]
    paths:
      - 'src/**/*.js'
      - 'package.json'
      - 'bun.lock'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run build

      - name: Copy native modules
        run: |
          mkdir -p dist/node_modules
          for pkg in @discordjs/opus ffmpeg-static @snazzah/davey @snazzah/davey-linux-x64-musl @snazzah/davey-linux-x64-gnu; do
            [ -d "node_modules/$pkg" ] && cp -r "node_modules/$pkg" "dist/node_modules/$pkg" || true
          done

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ vars.SFTP_HOST }}
          port: ${{ vars.SFTP_PORT }}
          username: ${{ vars.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          local_path: ./dist/*
          remote_path: /
          sftp_only: true
          delete_remote_files: false
          args: -o StrictHostKeyChecking=no
