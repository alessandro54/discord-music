name: Deploy to Mamba Host

on:
  push:
    branches: [main]
    paths:
      - 'src/**/*.js'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Write build info
        run: |
          echo "export const COMMIT = '${{ github.sha }}';" > src/buildInfo.js
          echo "export const COMMIT_URL = 'https://github.com/${{ github.repository }}/commit/${{ github.sha }}';" >> src/buildInfo.js

      - run: bun run build

      - name: Download yt-dlp
        run: |
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux_musl -o dist/yt-dlp
          chmod +x dist/yt-dlp

      - name: Copy native modules
        run: |
          mkdir -p dist/node_modules
          for pkg in @discordjs/opus ffmpeg-static @snazzah/davey @snazzah/davey-linux-x64-musl @snazzah/davey-linux-x64-gnu; do
            [ -d "node_modules/$pkg" ] && cp -r "node_modules/$pkg" "dist/node_modules/$pkg" || true
          done

      - name: Deploy via SFTP
        env:
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_HOST: ${{ vars.SFTP_HOST }}
          SFTP_PORT: ${{ vars.SFTP_PORT }}
          SFTP_USER: ${{ vars.SFTP_USERNAME }}
        run: |
          sudo apt-get install -y sshpass > /dev/null 2>&1
          sshpass -p "$SFTP_PASSWORD" sftp -P "$SFTP_PORT" -o StrictHostKeyChecking=no "$SFTP_USER@$SFTP_HOST" <<'EOF'
          put dist/index.js /index.js
          put dist/yt-dlp /yt-dlp
          put -r dist/node_modules /node_modules
          EOF
