name: Deploy to Fly.io

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**/*.js'
      - 'package.json'
      - 'bun.lock'
      - 'Dockerfile'
      - 'fly.toml'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Write build info
        run: |
          echo "export const COMMIT = '${{ github.sha }}';" > src/lib/buildInfo.js
          echo "export const COMMIT_URL = 'https://github.com/${{ github.repository }}/commit/${{ github.sha }}';" >> src/lib/buildInfo.js

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only

      - name: Clean up old deployments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh api repos/${{ github.repository }}/deployments --paginate | jq '.[0].id')
          gh api repos/${{ github.repository }}/deployments --paginate | jq '.[].id' | grep -v "^$LATEST$" | while read id; do
            gh api -X POST "repos/${{ github.repository }}/deployments/$id/statuses" -f state=inactive > /dev/null 2>&1 || true
            gh api -X DELETE "repos/${{ github.repository }}/deployments/$id" > /dev/null 2>&1 || true
          done
