name: Build & Deploy to Dokku

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**/*.js'
      - 'deno.json'
      - 'deno.lock'
      - 'Dockerfile'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/alessandro54/discord-music

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Write build info
        run: |
          echo "export const COMMIT = '${{ github.sha }}';" > src/lib/buildInfo.js
          echo "export const COMMIT_URL = 'https://github.com/${{ github.repository }}/commit/${{ github.sha }}';" >> src/lib/buildInfo.js

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DOKKU_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 143.47.116.141 >> ~/.ssh/known_hosts

      - name: Deploy on Dokku
        run: |
          ssh -i ~/.ssh/id_ed25519 ubuntu@143.47.116.141 \
            "sudo dokku git:from-image bot ${{ env.IMAGE }}:${{ github.sha }}"
