<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bot Config</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:24px;max-width:720px;margin:0 auto}
h1{font-size:1.3rem;margin-bottom:8px;color:#58a6ff}
nav{margin-bottom:24px;font-size:.85rem}
nav a{color:#58a6ff;text-decoration:none}
nav a:hover{text-decoration:underline}
.guild{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin-bottom:16px}
.guild-name{font-size:.75rem;color:#8b949e;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.field{margin-bottom:12px}
label{display:block;font-size:.8rem;color:#8b949e;margin-bottom:4px}
select{background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:6px 10px;border-radius:6px;font-size:.85rem;width:100%;max-width:360px}
.row{display:flex;gap:8px;align-items:center;margin-top:14px}
button{background:#238636;border:1px solid #2ea043;color:#fff;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:.82rem}
button:hover{background:#2ea043}
.saved{color:#3fb950;font-size:.8rem;display:none}
</style>
</head>
<body>
<h1>⚙️ Bot Config</h1>
<nav><a href="/">← Now Playing</a></nav>
<div id="app"><p style="color:#8b949e">Loading…</p></div>
<script>
const TOKEN = new URLSearchParams(location.search).get('token') || '';
const qs = TOKEN ? '?token=' + TOKEN : '';

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function channelOpts(channels, selected) {
  return `<option value="">— not set —</option>` +
    channels.map(c =>
      `<option value="${c.id}"${c.id === selected ? ' selected' : ''}>#${esc(c.name)}</option>`
    ).join('');
}

async function save(guildId, form) {
  const data = new URLSearchParams(new FormData(form));
  await fetch(`/config/${guildId}${qs}`, { method: 'POST', body: data });
  const msg = form.querySelector('.saved');
  msg.style.display = 'inline';
  setTimeout(() => msg.style.display = 'none', 2000);
}

async function load() {
  const res = await fetch('/api/guilds' + qs);
  const guilds = await res.json();
  const app = document.getElementById('app');
  if (!guilds.length) {
    app.innerHTML = '<p style="color:#8b949e">No servers found.</p>';
    return;
  }
  app.innerHTML = guilds.map(g => `
    <div class="guild">
      <div class="guild-name">${esc(g.name)}</div>
      <form onsubmit="event.preventDefault();save('${g.id}',this)">
        <div class="field">
          <label>Welcome channel</label>
          <select name="welcome_channel_id">${channelOpts(g.channels, g.config.welcome_channel_id)}</select>
        </div>
        <div class="field">
          <label>Rules channel</label>
          <select name="rules_channel_id">${channelOpts(g.channels, g.config.rules_channel_id)}</select>
        </div>
        <div class="row">
          <button type="submit">Save</button>
          <span class="saved">✓ Saved</span>
        </div>
      </form>
    </div>
  `).join('');
}

load();
</script>
</body>
</html>
