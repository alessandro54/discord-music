app = 'discord-music-alr6jw'
primary_region = 'gru'

[build]

[env]
  NODE_ENV = "production"
  DB_URL = "sqlite:/data/bot.db"

[[mounts]]
  source = 'data'
  destination = '/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
