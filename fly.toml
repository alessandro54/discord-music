app = 'discord-music-alr6jw'
primary_region = 'gru'
swap_size_mb = 512

[build]

[deploy]
  # Register/refresh slash commands once per deploy, using the machine's secrets.
  release_command = "deno run --allow-all src/deployCommands.js"

[env]
  NODE_ENV = "production"
  DB_URL = "sqlite:/data/bot.db"

[[mounts]]
  source = 'data'
  destination = '/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[http_service]
  internal_port = 3000
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1
